expected_card_kinds:
  - format
  - asset
  - element
  - concept
out_of_scope:
  # Topics that may surface in these PDFs but belong to other batches.
  - moderation workflow and moderation statuses — covered by a future moderation-focused batch
  - campaign-level settings and strategies — covered by campaign-group-settings-v1
  - campaign lifecycle actions — covered by campaign-hierarchy-lifecycle-v1
  - interface surfaces and navigation — covered by interface-surfaces-v1
  - billing, payers, agency relations — covered by billing-agency-legal-entities-v1
  - legal marking, ORD, tokens, sanctions — covered by legal-marking-compliance-v1
review_owner: product-owner
forbidden_inputs:
  - raw Arcadia paths
  - unreviewed Wiki dumps committed to repo
output_path: knowledge/drafts/ad-formats-elements-v1/

# Notes:
# - PDFs live under /baza_znaniy/banners/ (gitignored). Symlinks under
#   knowledge/drafts/<pack-id>/inputs/ are the stable input paths.
# - Extract with `.venv-pdf/bin/python tools/direct-pro-knowledge/extract_pdf_text.py ad-formats-elements-v1`.
# - Do not commit the PDFs or the extracted text.
