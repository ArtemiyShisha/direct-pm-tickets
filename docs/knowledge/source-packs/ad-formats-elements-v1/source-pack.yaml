  - knowledge/drafts/ad-formats-elements-v1/inputs/Карусель-v1-5_17_2026, 2_01_35 PM.pdf
  - knowledge/drafts/ad-formats-elements-v1/inputs/Комбинаторное объявление в Ед.pdf
  - knowledge/drafts/ad-formats-elements-v1/inputs/Персонализация объявлений-v1-5_.pdf
