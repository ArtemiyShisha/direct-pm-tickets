  - knowledge/drafts/ad-formats-elements-v1/inputs/Графические объявления-v1-5_17_202.pdf
  - knowledge/drafts/ad-formats-elements-v1/inputs/Изображения-v1-5_17_2026, 2_01_12 PM.pdf
