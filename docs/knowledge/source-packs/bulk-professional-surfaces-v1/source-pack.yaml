expected_card_kinds:
  - tool
  - surface
  - integration
  - report
  - process
  - concept
  - failure
out_of_scope:
  - ad text, creative asset, and moderation behavior already covered by ad-formats-elements-v1 or a future moderation pack
  - statistics interpretation and optimization diagnostics already covered by reports-statistics-optimization-v1 unless the source describes a distinct tool surface
  - account access, agency roles, and representative permissions already covered by account-access-settings-v1
  - billing, payer, VAT, refund, and payment flows already covered by billing-agency-legal-entities-v1
review_owner: product-owner-or-domain-expert
forbidden_inputs:
  - raw Arcadia paths
  - unreviewed Wiki dumps committed to repo
output_path: knowledge/drafts/bulk-professional-surfaces-v1/

