  - knowledge/drafts/formats-shows-v1/inputs/РСЯ для блогеров-v1-5_17_2026, 2_48_20 PM.pdf
expected_card_kinds:
  - format
  - placement
  - setting
  - concept
  - failure
out_of_scope:
  # Topics that may surface in these PDFs but belong to other batches.
  - detailed moderation workflows and rejection statuses — covered by a future moderation-focused batch
  - broad targeting and semantics mechanics — covered by targeting-semantics-v1
  - full reports/statistics product surfaces — covered by reports-statistics-optimization-v1
  - billing, payers, agency relations — covered by billing-agency-legal-entities-v1
  - legal marking, ORD, tokens, sanctions — covered by legal-marking-compliance-v1
review_owner: product-owner
forbidden_inputs:
  - raw Arcadia paths
  - unreviewed Wiki dumps committed to repo
output_path: knowledge/drafts/formats-shows-v1/

# Notes:
# - PDFs live under /baza_znaniy/formats and shows/ (gitignored). Symlinks under
#   knowledge/drafts/<pack-id>/inputs/ are the stable input paths.
# - Extract with `.venv-pdf/bin/python tools/direct-pro-knowledge/extract_pdf_text.py formats-shows-v1`.
# - Do not commit the PDFs or the extracted text.
