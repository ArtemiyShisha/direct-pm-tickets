expected_card_kinds:
  - report
  - concept
  - process
  - failure
  - integration
  - setting
out_of_scope:
  # Topics that may surface in these PDFs but belong to other batches or existing cards.
  - campaign creation, hierarchy, group settings, targeting setup, ad materials, and show diagnostics unless tied to analytics interpretation
  - billing/payment/refund flows already covered by billing-agency-legal-entities-v1
  - legal marking, ORD, sanctions, and compliance outside statistics/reporting consequences
  - support-only operator scripts that do not change PM-visible Direct.Pro behavior
review_owner: product-owner
forbidden_inputs:
  - raw Arcadia paths
  - unreviewed Wiki dumps committed to repo
output_path: knowledge/drafts/reports-statistics-optimization-v1/

# Notes:
# - PDFs live under /baza_znaniy/stats/ (gitignored). Symlinks under
#   knowledge/drafts/<pack-id>/inputs/ are the stable input paths.
# - Extract with `.venv-pdf/bin/python tools/direct-pro-knowledge/extract_pdf_text.py reports-statistics-optimization-v1`.
# - Do not commit the PDFs, symlinks, extracted text, or draft card outputs.
